<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="포포로그 앱 다운로드. 기기에 맞는 앱스토어로 자동 연결됩니다." />
  <meta name="color-scheme" content="light" />
  <meta name="robots" content="noindex, follow" />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="ko_KR" />
  <meta property="og:site_name" content="포포로그(PopoLog)" />
  <meta property="og:title" content="포포로그(PopoLog) 앱 다운로드" />
  <meta property="og:description" content="기기에 맞는 앱스토어로 자동 연결됩니다." />
  <meta property="og:url" content="https://popolog.co.kr/download" />
  <meta property="og:image" content="https://popolog.co.kr/assets/bg_hero.webp" />
  <title>포포로그(PopoLog) 앱 다운로드</title>
  <link rel="canonical" href="https://popolog.co.kr/download" />
  <link rel="icon" type="image/webp" href="assets/lg_popo_square.webp" />
  <link rel="apple-touch-icon" href="assets/lg_popo_square.webp" />
  <link rel="stylesheet" href="style.css?v=app-download" />
  <style>
    .dl-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 22px;
      padding: 40px 24px;
      box-sizing: border-box;
    }
    .dl-logo {
      width: 84px;
      height: 84px;
      border-radius: 22px;
      box-shadow: 0 14px 30px rgba(80, 50, 42, 0.22);
    }
    .dl-title {
      margin: 0;
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--color-text);
    }
    .dl-desc {
      margin: 0;
      max-width: 22rem;
      font-size: 1rem;
      line-height: 1.6;
      color: var(--color-muted);
    }
    .dl-spinner {
      width: 26px;
      height: 26px;
      border: 3px solid var(--color-primary-light);
      border-top-color: var(--color-primary);
      border-radius: 50%;
      animation: dl-spin 0.8s linear infinite;
    }
    @keyframes dl-spin { to { transform: rotate(360deg); } }
    .dl-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
    }
    .dl-manual {
      font-size: 0.9rem;
      color: var(--color-muted);
    }
    .dl-manual a { color: var(--color-primary-dark); font-weight: 600; }
    /* 기본(데스크톱·미지원 기기): 스토어 선택 안내 노출, 자동이동 요소 숨김 */
    .dl-spinner,
    .dl-redirect-msg { display: none; }
    /* 자동 이동 중(모바일): 스피너·이동 안내 노출, 선택 안내 숨김 */
    .dl-redirecting .dl-spinner { display: block; }
    .dl-redirecting .dl-redirect-msg { display: block; }
    .dl-redirecting .dl-choose-msg { display: none; }
    @media (prefers-reduced-motion: reduce) {
      .dl-spinner { animation: none; }
    }
  </style>
</head>
<body>
  <main class="dl-wrap">
    <img class="dl-logo" src="assets/lg_popo_square.webp" alt="포포로그 로고" />
    <h1 class="dl-title">포포로그 앱 다운로드</h1>

    <div class="dl-spinner" aria-hidden="true"></div>
    <p class="dl-desc dl-redirect-msg">기기에 맞는 스토어로 이동하고 있어요…</p>
    <p class="dl-desc dl-choose-msg">사용 중인 기기의 스토어를 선택해 주세요.</p>

    <div class="dl-badges store-badges">
      <a id="dl-ios" class="store-badge" href="https://apps.apple.com/kr/app/%ED%8F%AC%ED%8F%AC%EB%A1%9C%EA%B7%B8/id6774222814" rel="noopener" aria-label="App Store에서 포포로그 내려받기">
        <svg class="store-badge-ico" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path fill="currentColor" d="M16.365 1.43c0 1.14-.49 2.27-1.23 3.06-.79.84-2.06 1.49-3.13 1.41-.11-1.05.4-2.16 1.07-2.86.74-.79 2.07-1.42 3.29-1.61zM18.99 17.05c-.54 1.24-.8 1.79-1.49 2.89-.97 1.54-2.34 3.46-4.03 3.47-1.5.01-1.89-.99-3.93-.98-2.04.01-2.47.99-3.97.98-1.69-.01-2.98-1.75-3.95-3.29-2.7-4.3-2.99-9.35-1.32-12.03 1.18-1.9 3.05-3.02 4.81-3.02 1.78 0 2.91 1.01 4.39 1.01 1.43 0 2.3-1.01 4.36-1.01 1.55 0 3.2.85 4.37 2.31-3.83 2.1-3.21 7.59.78 9.69z" />
        </svg>
        <span class="store-badge-text">
          <span class="store-badge-top">App Store에서</span>
          <span class="store-badge-name">다운로드</span>
        </span>
      </a>
      <a id="dl-android" class="store-badge" href="https://play.google.com/store/apps/details?id=app.popolog.app" rel="noopener" aria-label="Google Play에서 포포로그 내려받기">
        <svg class="store-badge-ico" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path fill="#00D7FE" d="M3.063 1.32a1.5 1.5 0 0 0-.49 1.13v19.1a1.5 1.5 0 0 0 .49 1.13l.064.062L13.79 12.13v-.26L3.127 1.258z" />
          <path fill="#FFCE00" d="M17.36 15.69l-3.57-3.56v-.26l3.57-3.57.08.046 4.23 2.403c1.21.687 1.21 1.81 0 2.5l-4.23 2.403z" />
          <path fill="#FD3B53" d="M17.44 15.643L13.79 12 3.063 22.68c.4.42 1.06.474 1.8.054l12.577-7.09z" />
          <path fill="#00F076" d="M17.44 8.357L4.863 1.266c-.74-.42-1.4-.366-1.8.054L13.79 12z" />
        </svg>
        <span class="store-badge-text">
          <span class="store-badge-top">Google Play에서</span>
          <span class="store-badge-name">다운로드</span>
        </span>
      </a>
    </div>

    <p class="dl-manual dl-redirect-msg">이동하지 않으면 위 버튼을 눌러 주세요.</p>
  </main>

  <script>
    (function () {
      var IOS_URL = "https://apps.apple.com/kr/app/%ED%8F%AC%ED%8F%AC%EB%A1%9C%EA%B7%B8/id6774222814";
      var ANDROID_URL = "https://play.google.com/store/apps/details?id=app.popolog.app";

      var ua = navigator.userAgent || "";
      var maxTouch = navigator.maxTouchPoints || 0;
      var isAndroid = /android/i.test(ua);
      // iPadOS는 데스크톱 사파리처럼 Macintosh로 보고하므로 터치 지원 여부로 보강
      var isIOS = /iphone|ipad|ipod/i.test(ua) || (/Macintosh/.test(ua) && maxTouch > 1);

      var target = isAndroid ? ANDROID_URL : (isIOS ? IOS_URL : null);

      if (target) {
        document.body.classList.add("dl-redirecting");
        // replace를 사용해 뒤로가기 시 이 페이지에 갇히지 않도록 처리
        window.location.replace(target);
      }
    })();
  </script>
</body>
</html>
